<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>AEtelecom · Tarifador HSR v8.0</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@600;700&display=swap');
  :root { --bg: #050810; --card: #0d1321; --border: #1e2d45; --cyan: #00d4ff; --green: #00ff9d; --amber: #ffb800; --text: #c8d8ee; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; }
  
  .header-meta { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--cyan); padding-bottom: 10px; margin-bottom: 20px; }
  .resumo-geral { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
  .box-total { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; text-align: center; }
  .box-total b { font-family: 'JetBrains Mono'; font-size: 24px; color: #fff; }

  .grid-filas { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 15px; }
  .card-fila { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; border-left: 4px solid var(--cyan); }
  .card-fila h2 { margin: 0 0 5px 0; font-size: 13px; color: var(--cyan); font-family: 'JetBrains Mono'; overflow: hidden; text-overflow: ellipsis; }
  .op-info { font-size: 10px; color: #5c7a9d; margin-bottom: 12px; display: block; border-bottom: 1px solid #1e2d45; padding-bottom: 5px; }
  
  .item-custo { display: flex; justify-content: space-between; margin: 4px 0; font-family: 'JetBrains Mono'; font-size: 13px; }
  .total-fila { margin-top: 12px; padding-top: 8px; border-top: 1px dashed #3d5470; font-size: 18px; font-weight: bold; color: #fff; }
  
  .status-log { background: #000; padding: 10px; border: 1px solid var(--border); font-family: 'JetBrains Mono'; font-size: 11px; max-height: 140px; overflow-y: auto; margin-top: 20px; color: #5c7a9d; border-radius: 5px; }
</style>
</head>
<body>

<div class="header-meta">
  <h1 style="margin:0;">TARIFADOR <span style="color:var(--cyan)">HSR</span> <small style="font-size: 11px; color: var(--green);">· HISTÓRICO DIÁRIO</small></h1>
  <div>OPERADORA: <b>AETELECOM</b></div>
</div>

<div class="resumo-geral">
  <div class="box-total"><span>FIXO (0.028)</span><br><b id="g-fixo" style="color:var(--amber)">R$ 0,00</b></div>
  <div class="box-total"><span>CELULAR (0.030)</span><br><b id="g-cel" style="color:var(--green)">R$ 0,00</b></div>
  <div class="box-total"><span>TOTAL HOJE</span><br><b id="g-total" style="color:var(--cyan)">R$ 0,00</b></div>
</div>

<div class="grid-filas" id="gridFilas"></div>

<div class="status-log" id="logSistema">[SISTEMA] Iniciando monitoramento automático...</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAtAuuU-FTTXnQHV_Rc_3Vb-im-1jLnEM4",
  databaseURL: "https://tarifadorhsr-default-rtdb.firebaseio.com/",
  projectId: "tarifadorhsr"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const MAILING_API = 'https://fastdialer.fastquest.net/app/discador/mailing_api.php';
const proxy = (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}&t=${Date.now()}`;

const PRECOS = { FIXO: 0.028, CEL: 0.030 }; //
let dbLocal = {};

// Sincroniza em tempo real com o Firebase
db.ref('tarifador_hsr_v8').on('value', snap => {
  dbLocal = snap.val() || {};
  renderizar();
});

function log(msg, erro = false) {
  const el = document.getElementById('logSistema');
  el.innerHTML += `<div style="color:${erro ? '#ff4560' : '#00ff9d'}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// Quebra revisada baseada nos prints
function extrairInfo(agenteString) {
  if (!agenteString || agenteString.includes("não identificado")) return { fila: "SISTEMA", op: "AUTO" };
  
  // Remove ID após o ;
  let parteUtil = agenteString.split(';')[0];
  
  // Fila é antes do '-', Entrevistador é depois
  if (parteUtil.includes('-')) {
    let partes = parteUtil.split('-');
    return { 
        fila: partes[0].trim(), 
        op: partes[1].trim() 
    };
  }
  return { fila: parteUtil.trim(), op: "GERAL" };
}

function ehCelular(numero) {
  const n = String(numero).replace(/\D/g, '');
  return n.length >= 10 && ["7","8","9"].includes(n.charAt(2)); //
}

async function cicloHistorico() {
  const agora = new Date();
  
  // Monta datas: Início do dia até o momento da solicitação
  const dataInicio = agora.toISOString().split('T')[0] + " 00:00:00";
  const dataFim = agora.toISOString().slice(0, 19).replace('T', ' ');

  const url = `${MAILING_API}?report_status=1&start_date=${encodeURIComponent(dataInicio)}&end_date=${encodeURIComponent(dataFim)}`;
  
  log(`Sincronizando hoje (${dataInicio} até agora)...`);

  try {
    const res = await fetch(proxy(url));
    const json = await res.json();
    const chamadas = json.calls || json.data || [];

    if (chamadas.length === 0) return log("Nenhum custo registrado hoje.");

    // Novo objeto temporário para recalcular o dia sem duplicar
    let novoAcumulado = {};

    chamadas.forEach(c => {
      const info = extrairInfo(c.agent_name || c.agent_info?.agent_name);
      const destino = c.phone_number || c.caller_number || "";
      const tipo = ehCelular(destino) ? 'CEL' : 'FIXO';
      const duracao = parseInt(c.duration) || 0;
      const custo = (duracao / 60) * (tipo === 'CEL' ? PRECOS.CEL : PRECOS.FIXO);

      if (!novoAcumulado[info.fila]) {
        novoAcumulado[info.fila] = { fixo: 0, cel: 0, ops: {} };
      }

      // Acumula custo da fila
      if (tipo === 'CEL') novoAcumulado[info.fila].cel += custo;
      else novoAcumulado[info.fila].fixo += custo;

      // Guarda custo por entrevistador dentro da fila
      if (!novoAcumulado[info.fila].ops[info.op]) novoAcumulado[info.fila].ops[info.op] = 0;
      novoAcumulado[info.fila].ops[info.op] += custo;
    });

    // Atualiza o Firebase com o histórico recalculado do dia
    await db.ref('tarifador_hsr_v8').set(novoAcumulado);
    log(`Sucesso: ${chamadas.length} chamadas processadas no histórico.`);

  } catch (err) {
    log("Erro ao conectar na Mailing API.", true); //
  }
}

function renderizar() {
  const grid = document.getElementById('gridFilas');
  let tF = 0, tC = 0;

  grid.innerHTML = Object.entries(dbLocal).map(([fila, v]) => {
    const sub = (v.fixo || 0) + (v.cel || 0);
    tF += v.fixo; tC += v.cel;
    
    // Lista os entrevistadores que geraram custo nessa fila
    const listaOps = Object.entries(v.ops || {})
      .map(([nome, custo]) => `${nome} (R$ ${custo.toFixed(2)})`)
      .join(', ');

    return `
      <div class="card-fila">
        <h2>FILA: ${fila}</h2>
        <span class="op-info"><b>Operadores:</b> ${listaOps || 'N/A'}</span>
        <div class="item-custo"><span>Fixo (0.028):</span><span style="color:var(--amber)">R$ ${v.fixo.toLocaleString('pt-BR', {minimumFractionDigits: 3})}</span></div>
        <div class="item-custo"><span>Celular (0.03):</span><span style="color:var(--green)">R$ ${v.cel.toLocaleString('pt-BR', {minimumFractionDigits: 3})}</span></div>
        <div class="total-fila">ACUMULADO: R$ ${sub.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
      </div>
    `;
  }).join('');

  document.getElementById('g-fixo').innerText = `R$ ${tF.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
  document.getElementById('g-cel').innerText = `R$ ${tC.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
  document.getElementById('g-total').innerText = `R$ ${(tF + tC).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
}

// Roda a cada 5 minutos automaticamente
setInterval(cicloHistorico, 300000);
cicloHistorico();
</script>
</body>
</html>
