<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>AEtelecom · Tarifador HSR</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@600;700&display=swap');
  :root { --bg: #050810; --card: #0d1321; --border: #1e2d45; --cyan: #00d4ff; --green: #00ff9d; --amber: #ffb800; --text: #c8d8ee; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; }
  
  .header-meta { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--cyan); padding-bottom: 10px; margin-bottom: 20px; }
  .resumo-geral { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
  .box-total { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; text-align: center; }
  .box-total b { font-family: 'JetBrains Mono'; font-size: 24px; color: #fff; }

  .btn-cdr { background: #16213e; border: 1px solid var(--green); color: var(--green); padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }

  .grid-filas { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
  .card-fila { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; position: relative; overflow: hidden; }
  .card-fila::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--cyan); }
  .card-fila h2 { margin: 0 0 10px 0; font-size: 14px; color: var(--cyan); font-family: 'JetBrains Mono'; }
  
  .item-custo { display: flex; justify-content: space-between; margin: 5px 0; font-family: 'JetBrains Mono'; font-size: 13px; }
  .total-fila { margin-top: 15px; padding-top: 8px; border-top: 1px dashed #3d5470; font-size: 18px; font-weight: bold; color: #fff; }
  
  .status-log { background: #000; padding: 10px; border: 1px solid var(--border); font-family: 'JetBrains Mono'; font-size: 11px; max-height: 150px; overflow-y: auto; margin-top: 20px; color: #5c7a9d; }
</style>
</head>
<body>

<div class="header-meta">
  <h1 style="margin:0;">TARIFADOR <span style="color:var(--cyan)">HSR</span></h1>
  <div style="text-align:right"><small>OPERADORA: <b>AETELECOM</b></small></div>
</div>

<div class="resumo-geral">
  <div class="box-total"><span>FIXO GERAL</span><br><b id="g-fixo" style="color:var(--amber)">R$ 0,00</b></div>
  <div class="box-total"><span>CELULAR GERAL</span><br><b id="g-cel" style="color:var(--green)">R$ 0,00</b></div>
  <div class="box-total"><span>TOTAL ACUMULADO</span><br><b id="g-total" style="color:var(--cyan)">R$ 0,00</b></div>
</div>

<button class="btn-cdr" onclick="exportarCDR()">EXTRAIR CDR (AETELECOM)</button>

<div class="grid-filas" id="gridFilas"></div>

<div class="status-log" id="logSistema">[SISTEMA] Iniciando bilhetagem HSR...</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAtAuuU-FTTXnQHV_Rc_3Vb-im-1jLnEM4",
  databaseURL: "https://tarifadorhsr-default-rtdb.firebaseio.com/",
  projectId: "tarifadorhsr"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const API_URL = 'https://fastdialer.fastquest.net/app/extensions/active_calls_api.php';
const proxy = (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}&t=${Date.now()}`;

const PRECOS = { FIXO: 0.028, CEL: 0.030 }; //
let dbLocal = {}; 
let cdrParaExportar = [];

// Carregar dados existentes para não zerar
db.ref('tarifador_hsr_v5').on('value', snap => {
  dbLocal = snap.val() || {};
  renderizar();
});

function log(msg, erro = false) {
  const el = document.getElementById('logSistema');
  const cor = erro ? '#ff4560' : '#00ff9d';
  el.innerHTML += `<div style="color:${cor}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function identificarFilaEEntrevistador(agentName) {
  if (!agentName || agentName.includes("não identificado")) return { fila: "OUTROS", op: "SISTEMA" };
  
  // Limpa o ID após o ponto e vírgula
  let limpo = agentName.split(';')[0];
  
  // A FILA é o que vem antes do primeiro "-"
  if (limpo.includes('-')) {
    let partes = limpo.split('-');
    return { fila: partes[0].trim(), op: partes[1].trim() };
  }
  return { fila: limpo.trim(), op: "OPERADOR" };
}

function ehCelular(num) {
  const n = String(num).replace(/\D/g, '');
  return n.length >= 10 && ["7","8","9"].includes(n.charAt(2)); //
}

async function tarifar() {
  try {
    const res = await fetch(proxy(API_URL));
    const data = await res.json();
    const calls = data.calls || [];
    
    if (calls.length === 0) {
      log("Monitorando... Nenhuma chamada ativa no momento.");
      return;
    }

    calls.forEach(c => {
      const info = identificarFilaEEntrevistador(c.agent_info?.agent_name);
      const tipo = ehCelular(c.caller_number) ? 'CEL' : 'FIXO';
      const min = (parseInt(c.duration) || 0) / 60;
      const custo = min * (tipo === 'CEL' ? PRECOS.CEL : PRECOS.FIXO);

      // SOMA AO ACUMULADO (Sem zerar)
      if (!dbLocal[info.fila]) dbLocal[info.fila] = { fixo: 0, cel: 0 };
      
      if (tipo === 'CEL') dbLocal[info.fila].cel += custo;
      else dbLocal[info.fila].fixo += custo;

      cdrParaExportar.push({
        op: "AEtelecom",
        fila: info.fila,
        entrevistador: info.op,
        destino: c.caller_number,
        tipo: tipo,
        valor: custo.toFixed(4)
      });
    });

    // Salva no Firebase para persistência
    await db.ref('tarifador_hsr_v5').set(dbLocal);
    log(`Tarifado com sucesso: ${calls.length} chamadas processadas.`);

  } catch (e) {
    log("Erro ao acessar API ou JSON inválido.", true); //
  }
}

function renderizar() {
  const grid = document.getElementById('gridFilas');
  let tF = 0, tC = 0;

  grid.innerHTML = Object.entries(dbLocal).map(([nome, v]) => {
    const sub = (v.fixo || 0) + (v.cel || 0);
    tF += v.fixo; tC += v.cel;
    return `
      <div class="card-fila">
        <h2>FILA: ${nome}</h2>
        <div class="item-custo"><span>FIXO:</span><span style="color:var(--amber)">R$ ${v.fixo.toLocaleString('pt-BR', {minimumFractionDigits: 3})}</span></div>
        <div class="item-custo"><span>CELULAR:</span><span style="color:var(--green)">R$ ${v.cel.toLocaleString('pt-BR', {minimumFractionDigits: 3})}</span></div>
        <div class="total-fila">TOTAL: R$ ${sub.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
      </div>
    `;
  }).join('');

  document.getElementById('g-fixo').innerText = `R$ ${tF.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
  document.getElementById('g-cel').innerText = `R$ ${tC.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
  document.getElementById('g-total').innerText = `R$ ${(tF + tC).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
}

function exportarCDR() {
  if (cdrParaExportar.length === 0) return alert("Sem dados de chamadas recentes.");
  let csv = "Operadora;Fila;Entrevistador;Destino;Tipo;Valor\n";
  cdrParaExportar.forEach(r => csv += `AEtelecom;${r.fila};${r.entrevistador};${r.destino};${r.tipo};${r.valor}\n`);
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `CDR_AETELECOM_HSR.csv`;
  a.click();
}

// Ciclo de 5 min para bater com o log da imagem
setInterval(tarifar, 300000);
tarifar();
</script>
</body>
</html>
