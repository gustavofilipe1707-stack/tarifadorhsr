<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>AEtelecom · Bilhetador GFS</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@600;700&display=swap');
  :root { --bg: #050810; --card: #0d1321; --border: #1e2d45; --cyan: #00d4ff; --green: #00ff9d; --amber: #ffb800; --text: #c8d8ee; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; }
  
  .header-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .resumo-geral { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 25px; }
  .box-total { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 10px; text-align: center; }
  .box-total b { font-family: 'JetBrains Mono'; font-size: 26px; color: #fff; }

  .btn-cdr { 
    background: #16213e; border: 1px solid var(--green); color: var(--green); 
    padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold;
    text-transform: uppercase; margin-bottom: 30px; transition: 0.3s;
  }
  .btn-cdr:hover { background: var(--green); color: #000; box-shadow: 0 0 10px var(--green); }

  .grid-filas { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
  .card-fila { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; border-left: 5px solid var(--cyan); position: relative; }
  .card-fila h2 { margin: 0 0 5px 0; color: var(--cyan); font-size: 14px; font-family: 'JetBrains Mono'; word-break: break-all; }
  .op-label { font-size: 10px; color: #5c7a9d; text-transform: uppercase; margin-bottom: 15px; display: block; }
  
  .item-custo { display: flex; justify-content: space-between; margin-bottom: 8px; font-family: 'JetBrains Mono'; font-size: 13px; }
  .total-fila { margin-top: 15px; padding-top: 10px; border-top: 1px dashed var(--border); font-size: 18px; color: #fff; font-weight: 700; }
  .status-bar { position: fixed; bottom: 0; left:0; width: 100%; background: #000; font-size: 10px; padding: 5px 20px; display: flex; justify-content: space-between; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<div class="header-meta">
  <h1 style="margin:0; font-size: 24px;">AE<span style="color:var(--cyan)">telecom</span> <small style="font-size:12px; color:var(--green)">· Bilhetagem GFS</small></h1>
  <div id="lastSync" style="font-size: 12px; color: #5c7a9d;">Aguardando...</div>
</div>

<div class="resumo-geral">
  <div class="box-total"><span>Fixo (0.028)</span><br><b id="geral-fixo" style="color:var(--amber)">R$ 0,00</b></div>
  <div class="box-total"><span>Celular (0.03)</span><br><b id="geral-cel" style="color:var(--green)">R$ 0,00</b></div>
  <div class="box-total"><span>Total Geral</span><br><b id="geral-total" style="color:var(--cyan)">R$ 0,00</b></div>
</div>

<button class="btn-cdr" onclick="exportarCDR()">⬇ Extrair Relatório CDR (AEtelecom)</button>

<div class="grid-filas" id="gridFilas"></div>

<div class="status-bar">
  <div id="apiStatus">STATUS: INICIANDO...</div>
  <div>OPERADORA: AETELECOM</div>
</div>

<script>
// Configuração Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAtAuuU-FTTXnQHV_Rc_3Vb-im-1jLnEM4",
  databaseURL: "https://tarifadorhsr-default-rtdb.firebaseio.com/",
  projectId: "tarifadorhsr"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const API_URL = 'https://fastdialer.fastquest.net/app/extensions/active_calls_api.php';
const proxies = [
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}&t=${Date.now()}`,
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`
];

const TARIFAS = { FIXO: 0.028, CEL: 0.030 }; //

let dadosFilas = {};
let chamadasLogadas = [];

// Escuta em tempo real
db.ref('financeiro/filas_v4').on('value', snap => {
  dadosFilas = snap.val() || {};
  renderizar();
});

// LÓGICA DE EXTRAÇÃO BASEADA NO PRINT
function processarAgente(raw) {
  if (!raw || raw.includes("não identificado")) {
    return { fila: "PROJETO_DESCONHECIDO", entrevistador: "SISTEMA" };
  }

  // 1. Remove o ID final (depois do ;)
  let base = raw.split(';')[0].trim();

  // 2. Separa FILA de ENTREVISTADOR usando o '-'
  if (base.includes('-')) {
    let partes = base.split('-');
    return {
      fila: partes[0].trim(),           // EX: 20743brkmaranhaoabril
      entrevistador: partes[1].trim()    // EX: KAIO_VINICIUS
    };
  }

  return { fila: base, entrevistador: "OPERADOR" };
}

function isCelular(num) {
  const n = String(num).replace(/\D/g, '');
  return n.length >= 10 && ["7","8","9"].includes(n.charAt(2)); //
}

async function rodarCiclo() {
  const statusEl = document.getElementById('apiStatus');
  try {
    let response;
    // Tenta proxies em sequência para evitar erro 404
    try {
      response = await fetch(proxies[0](API_URL));
    } catch {
      response = await fetch(proxies[1](API_URL));
    }
    
    const data = await response.json();
    const calls = data.calls || [];
    
    calls.forEach(c => {
      const info = processarAgente(c.agent_info?.agent_name);
      const tipo = isCelular(c.caller_number) ? 'CEL' : 'FIXO';
      const minutos = (parseInt(c.duration) || 0) / 60;
      const custo = minutos * (tipo === 'CEL' ? TARIFAS.CEL : TARIFAS.FIXO);

      // Atualiza acumulado por FILA para cobrança
      if (!dadosFilas[info.fila]) {
        dadosFilas[info.fila] = { fixo: 0, cel: 0, entrevistadores: {} };
      }
      
      if (tipo === 'CEL') dadosFilas[info.fila].cel += custo;
      else dadosFilas[info.fila].fixo += custo;

      // Guarda último entrevistador ativo na fila
      dadosFilas[info.fila].ultimo = info.entrevistador;

      // Prepara dado para o CSV
      chamadasLogadas.push({
        operadora: "AEtelecom",
        fila: info.fila,
        entrevistador: info.entrevistador,
        numero: c.caller_number,
        tipo: tipo,
        valor: custo.toFixed(4)
      });
    });

    await db.ref('financeiro/filas_v4').set(dadosFilas);
    statusEl.innerText = "● CONEXÃO AEtelecom OK";
    document.getElementById('lastSync').innerText = "Última Sync: " + new Date().toLocaleTimeString();

  } catch (err) {
    statusEl.innerText = "○ ERRO NA API (VERIFICAR PROXY)";
  }
}

function renderizar() {
  const container = document.getElementById('gridFilas');
  let tFixo = 0, tCel = 0;

  container.innerHTML = Object.entries(dadosFilas).map(([idFila, v]) => {
    const subtotal = (v.fixo || 0) + (v.cel || 0);
    tFixo += v.fixo; tCel += v.cel;

    return `
      <div class="card-fila">
        <h2>${idFila}</h2>
        <span class="op-label">Atividade: ${v.ultimo || 'Inativa'}</span>
        <div class="item-custo"><span>Custos Fixos:</span><span style="color:var(--amber)">R$ ${v.fixo.toLocaleString('pt-BR', {minimumFractionDigits: 3})}</span></div>
        <div class="item-custo"><span>Custos Celular:</span><span style="color:var(--green)">R$ ${v.cel.toLocaleString('pt-BR', {minimumFractionDigits: 3})}</span></div>
        <div class="total-fila"><span>SUBTOTAL:</span><span style="color:var(--cyan)">R$ ${subtotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span></div>
      </div>
    `;
  }).join('');

  document.getElementById('geral-fixo').innerText = `R$ ${tFixo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
  document.getElementById('geral-cel').innerText = `R$ ${tCel.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
  document.getElementById('geral-total').innerText = `R$ ${(tFixo + tCel).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
}

function exportarCDR() {
  if (chamadasLogadas.length === 0) return alert("Aguarde a coleta de dados...");
  let csv = "\uFEFFOperadora;Fila;Entrevistador;Destino;Tipo;Valor(R$)\n";
  chamadasLogadas.forEach(r => {
    csv += `${r.operadora};${r.fila};${r.entrevistador};${r.numero};${r.tipo};${r.valor}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `CDR_AEtelecom_GFS_${Date.now()}.csv`;
  a.click();
}

// Ciclo de 5 min conforme painel
setInterval(rodarCiclo, 300000);
rodarCiclo();
</script>
</body>
</html>
