<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FastDialer · Gestão de Custos por Fila</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@600;700&display=swap');
  :root { --bg: #070b14; --card: #0c1220; --border: #1e2d45; --cyan: #00d4ff; --green: #00ff9d; --amber: #ffb800; --text: #c8d8ee; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; }
  
  /* Grid de Projetos/Filas */
  .grid-filas { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
  .card-fila { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .card-fila h2 { margin: 0 0 15px 0; color: var(--cyan); font-size: 20px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  
  /* Linhas de Valores */
  .item-custo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; font-size: 14px; }
  .item-custo span:last-child { font-weight: bold; }
  .label-fixo { color: var(--amber); }
  .label-celular { color: var(--green); }
  .total-fila { margin-top: 15px; padding-top: 10px; border-top: 1px dashed var(--border); font-size: 18px; color: #fff; }
  
  .status-api { position: fixed; bottom: 20px; right: 20px; padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; background: var(--card); border: 1px solid var(--border); }
  .log-mini { margin-top: 30px; font-family: 'JetBrains Mono'; font-size: 11px; color: #3d5470; border-top: 1px solid var(--border); padding-top: 10px; }
</style>
</head>
<body>

<header style="margin-bottom: 30px;">
  <h1 style="margin:0; font-size: 28px;">FAST<span style="color:var(--cyan)">DIALER</span> BILHETADOR</h1>
  <p style="margin:5px 0; color: #3d5470;">Resumo Financeiro por Fila (Ciclo: 5 Minutos)</p>
</header>

<div class="grid-filas" id="gridFilas">
  </div>

<div class="status-api" id="apiStatus">STATUS: INICIANDO...</div>
<div class="log-mini" id="logBody"></div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAtAuuU-FTTXnQHV_Rc_3Vb-im-1jLnEM4",
  databaseURL: "https://tarifadorhsr-default-rtdb.firebaseio.com/",
  projectId: "tarifadorhsr"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const API_URL = 'https://fastdialer.fastquest.net/app/extensions/active_calls_api.php';
const PROXY = `https://api.allorigins.win/raw?url=${encodeURIComponent(API_URL)}`;
const TARIFAS = { FIXO: 0.028, CEL: 0.030 }; //

let dadosFinanceiros = {};

// Sincroniza com Firebase
db.ref('financeiro/filas').on('value', snap => {
  dadosFinanceiros = snap.val() || {};
  atualizarVisual();
});

function isCelular(num) {
  const n = String(num).replace(/\D/g, '');
  return n.length >= 10 && ["7","8","9"].includes(n.charAt(2)); //
}

async function rodarCiclo() {
  const status = document.getElementById('apiStatus');
  try {
    const res = await fetch(`${PROXY}&t=${Date.now()}`);
    if (!res.ok) throw new Error("Falha no Proxy");
    const data = await res.json();
    const calls = data.calls || [];

    let atualizacoes = {};

    calls.forEach(c => {
      const fila = c.agent_info?.agent_name || "Fila Geral";
      const tipo = isCelular(c.caller_number) ? 'CEL' : 'FIXO';
      const minutos = (parseInt(c.duration) || 0) / 60;
      const custo = minutos * TARIFAS[tipo];

      // Inicializa estrutura se não existir
      if (!dadosFinanceiros[fila]) dadosFinanceiros[fila] = { fixo: 0, celular: 0 };
      
      // Incrementa conforme o tipo
      if (tipo === 'FIXO') dadosFinanceiros[fila].fixo += custo;
      else dadosFinanceiros[fila].celular += custo;
    });

    // Salva no Firebase
    await db.ref('financeiro/filas').set(dadosFinanceiros);
    status.innerText = `ÚLTIMA SYNC: ${new Date().toLocaleTimeString()}`;
    status.style.color = "var(--green)";
    log("Processamento concluído com sucesso.");

  } catch (err) {
    status.innerText = "ERRO NA API (FETCH FAILED)";
    status.style.color = "var(--red)";
    log("Erro no fetch: " + err.message);
  }
}

function atualizarVisual() {
  const container = document.getElementById('gridFilas');
  container.innerHTML = Object.entries(dadosFinanceiros).map(([nome, valores]) => {
    const total = (valores.fixo || 0) + (valores.celular || 0);
    return `
      <div class="card-fila">
        <h2>${nome}</h2>
        <div class="item-custo">
          <span class="label-fixo">Total Fixo:</span>
          <span>R$ ${(valores.fixo || 0).toLocaleString('pt-BR', {minimumFractionDigits: 3})}</span>
        </div>
        <div class="item-custo">
          <span class="label-celular">Total Celular:</span>
          <span>R$ ${(valores.celular || 0).toLocaleString('pt-BR', {minimumFractionDigits: 3})}</span>
        </div>
        <div class="item-custo total-fila">
          <span>TOTAL GERAL:</span>
          <span style="color:var(--cyan)">R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
        </div>
      </div>
    `;
  }).join('');
}

function log(msg) {
  const b = document.getElementById('logBody');
  b.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + b.innerHTML;
}

// Ciclo de 5 minutos
setInterval(rodarCiclo, 300000);
rodarCiclo();
</script>
</body>
</html>
